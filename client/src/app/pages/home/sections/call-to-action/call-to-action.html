<section class="cta-section">
  <div class="cta-bg"></div>
  <div class="cta-shapes">
    <div class="cta-shape cta-shape-1"></div>
    <div class="cta-shape cta-shape-2"></div>
  </div>

  <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
    <h2 class="text-4xl md:text-5xl font-bold text-white mb-6 leading-tight">
      Ready to Tell Your Story?
    </h2>
    <p class="text-lg text-white/80 mb-10 max-w-2xl mx-auto leading-relaxed">
      Join professionals who have transformed their careers with a compelling online portfolio 
      that tells their unique story.
    </p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a [routerLink]="['/signup']" class="cta-btn-primary">
        <lucide-icon name="rocket" [size]="18"></lucide-icon>
        Get Started Free
      </a>
      <a [routerLink]="['/portfolios']" class="cta-btn-secondary">
        Browse Portfolios
      </a>
    </div>
    <p class="mt-8 text-white/50 text-sm">No credit card required • Free forever</p>
  </div>
</section>
